name: Deploy

on:
  workflow_dispatch:  # gated to manual until Phase 13

concurrency:
  group: deploy-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  deploy:
    name: Deploy to Cloudflare Workers
    runs-on: ubuntu-latest
    timeout-minutes: 15
    environment: production
    needs: []
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Install dependencies
        run: npm install --no-fund --no-audit

      - name: Build
        run: npm run build

      - name: Create .assetsignore (exclude _worker.js from asset upload)
        run: |
          printf '_worker.js\n_routes.json\n' > dist/.assetsignore

      - name: Apply D1 migrations
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        run: npx --yes wrangler d1 migrations apply DB --remote

      - name: Push Worker secrets
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          OAUTH_CLIENT_ID: ${{ secrets.OAUTH_CLIENT_ID }}
          OAUTH_CLIENT_SECRET: ${{ secrets.OAUTH_CLIENT_SECRET }}
          OAUTH_JWT_SECRET: ${{ secrets.OAUTH_JWT_SECRET }}
          RESEND_API_KEY: ${{ secrets.RESEND_API_KEY }}
          RESEND_FROM: ${{ secrets.RESEND_FROM }}
          APP_URL: ${{ secrets.APP_URL }}
        run: |
          set -e
          for name in OAUTH_CLIENT_ID OAUTH_CLIENT_SECRET OAUTH_JWT_SECRET RESEND_API_KEY RESEND_FROM APP_URL; do
            TMP=$(mktemp)
            printf '%s' "${!name}" > "$TMP"
            npx --yes wrangler secret put "$name" < "$TMP"
            rm "$TMP"
          done

      - name: Deploy
        id: deploy
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        run: |
          set -o pipefail
          npx --yes wrangler deploy 2>&1 | tee deploy.log
          # Extract the workers.dev URL wrangler prints on success.
          WORKER_URL=$(grep -oE 'https://[^ ]+\.workers\.dev' deploy.log | head -n1 || true)
          echo "worker_url=$WORKER_URL" >> "$GITHUB_OUTPUT"
          echo "Deployed to: $WORKER_URL"

      - name: Smoke test
        env:
          WORKER_URL: ${{ steps.deploy.outputs.worker_url }}
        run: |
          # Prefer the workers.dev URL from wrangler deploy output — it's
          # always resolvable regardless of custom-domain DNS state. Fall
          # back to APP_URL only if the parse failed.
          URL="${WORKER_URL:-${{ secrets.APP_URL }}}"
          if [ -z "$URL" ]; then
            echo "No smoke-test URL available; skipping"
            exit 0
          fi
          # Expect 200 (authenticated user → /digest) or 303 (anonymous → login)
          # on /, both indicate a live worker. The landing page itself returns 200.
          CODE=$(curl -s -o /dev/null -w "%{http_code}" "$URL/")
          echo "GET $URL/ → HTTP $CODE"
          case "$CODE" in
            200|303) exit 0 ;;
            *) echo "Unexpected status"; exit 1 ;;
          esac
